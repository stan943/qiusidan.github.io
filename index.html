<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我的3D模型展示</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; top: 10px; left: 10px; }
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>✨ 3D 模型展示</h2>
        <p>鼠标拖拽旋转 | 右键拖拽平移 | 滚动缩放</p>
    </div>

    <!-- 引入 Three.js 核心库以及扩展组件 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';  // 新增：导入解码器

        // --- 1. 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.FogExp2(0x111122, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.3, 3.5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 2. 控制器 (支持触摸/鼠标交互) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0.5, 0);

        // --- 3. 灯光系统 ---
        const ambientLight = new THREE.AmbientLight(0xccddff,1.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 2.5);
        directionalLight.position.set(2, 3, 2);
        directionalLight.castShadow = true;
        directionalLight.receiveShadow = false;
        directionalLight.shadow.mapSize.width = 1024;
        directionalLight.shadow.mapSize.height = 1024;
        scene.add(directionalLight);
        
        const backLight = new THREE.PointLight(0xaaccff, 2.5);
        backLight.position.set(-1.5, 1.5, -2.5);
        scene.add(backLight);
        
        const fillLight = new THREE.PointLight(0xcceeff, 1.0);
        fillLight.position.set(1, 0.8, 2);
        scene.add(fillLight);
        
        const bottomLight = new THREE.PointLight(0x88aaff, 0.6);
        bottomLight.position.set(0, -1, 0);
        scene.add(bottomLight)

        const gridHelper = new THREE.GridHelper(5, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.8;
        scene.add(gridHelper);
        
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 800;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // --- 4. 加载 GLB 模型 (支持 meshopt 压缩) ---
        const loader = new GLTFLoader();
        loader.setMeshoptDecoder(MeshoptDecoder);  // 新增：设置解码器
        const modelPath = 'scene_optimized.glb';
        let model = null;

        loader.load(modelPath, 
            (gltf) => {
                model = gltf.scene;
                model.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = false;
                    }
                });
                model.position.set(0, -0.5, 0);
                model.scale.set(5, 5, 5);
                scene.add(model);
                console.log('✅ 模型加载成功');
            },
            (xhr) => {
                console.log(`📦 模型加载进度: ${(xhr.loaded / xhr.total * 100)}%`);
            },
            (error) => {
                console.error('❌ 模型加载失败:', error);
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshStandardMaterial({ color: 0xff6699 });
                const placeholder = new THREE.Mesh(geometry, material);
                placeholder.position.set(0, 0, 0);
                scene.add(placeholder);
            }
        );
        
        // --- 5. 简单动画: 让星星粒子缓慢旋转 ---
        function animateStars() {
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0003;
            requestAnimationFrame(animateStars);
        }
        animateStars();
        
        // --- 6. 主渲染循环 ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        // --- 7. 响应窗口尺寸变化 ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
